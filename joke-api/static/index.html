<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jokes</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="static/style.css">
</head>
<body>

  <div class="bg-blob b1"></div>
  <div class="bg-blob b2"></div>

  <div class="container py-5">

    <!-- HEADER -->
    <div class="d-flex align-items-center gap-3 mb-4">
      <span class="logo-emoji">😂</span>
      <div>
        <h1 class="mb-0">Joke Manager</h1>
        <p class="text-muted small mb-0">Your personal comedy archive</p>
      </div>
      <span id="jokeCount" class="badge rounded-pill ms-auto px-3 py-2 badge-count">0 jokes</span>
    </div>

    <!-- ADD CARD -->
    <div class="card mb-4">
      <div class="card-body p-4">

        <div class="input-group mb-3">
          <input id="jokeInput" type="text" class="form-control form-control-lg" placeholder="Type a new joke…" autocomplete="off" />
          <button class="btn btn-warning fw-bold px-4" onclick="addJoke()">
            <i class="bi bi-plus-lg me-1"></i>Add
          </button>
        </div>

        <div class="divider-or"><span>or</span></div>

        <div class="d-flex flex-wrap gap-2 align-items-center mt-3">
          <label class="file-label flex-grow-1">
            <i class="bi bi-upload me-2"></i>
            <span id="fileName">Choose file…</span>
            <input type="file" id="file" onchange="updateFileName(this)" />
          </label>
          <button class="btn btn-outline-light fw-semibold" onclick="importFile()">
            <i class="bi bi-file-arrow-up me-1"></i>Import
          </button>
          <button class="btn btn-outline-danger fw-semibold" onclick="clearAll()">
            <i class="bi bi-trash3 me-1"></i>Clear All
          </button>
        </div>

      </div>
    </div>

    <!-- LIST HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2 class="section-title mb-0">All Jokes</h2>
      <button class="btn btn-outline-secondary btn-sm fw-semibold" onclick="shuffleView()">
        <i class="bi bi-shuffle me-1"></i>Random
      </button>
    </div>

    <ul id="list" class="list-unstyled d-flex flex-column gap-2"></ul>

    <div id="empty" class="empty-state text-center py-5" style="display:none">
      <div style="font-size:3rem;opacity:.4">🎭</div>
      <p class="text-muted mt-2">No jokes yet. Add your first one!</p>
    </div>

  </div>

  <!-- TOAST -->
  <div class="toast-container position-fixed bottom-0 start-50 translate-middle-x pb-4">
    <div id="liveToast" class="toast align-items-center text-bg-dark border border-secondary" role="alert">
      <div class="d-flex">
        <div class="toast-body fw-semibold" id="toastMsg"></div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="static/app.js"></script>
</body>
</html>
